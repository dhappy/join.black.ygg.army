name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run check
      - run: pnpm run test:ci
      - run: pnpm run build
      - run: pnpm audit --prod --audit-level high

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@v1
      - run: pnpm install --frozen-lockfile
      - run: forge build --root test-contracts
      - run: pnpm run test:integration

  # Browser E2E against an Anvil-backed MockRegistrar (scripts/e2e-server.mjs builds the app with the
  # deployment baked into PUBLIC_* config, then serves it). Covers invalid-link, NotAuthorized,
  # AlreadyRedeemed, and form-validation flows. Self-contained — no external infra.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@v1
      - run: pnpm install --frozen-lockfile
      - run: forge build --root test-contracts
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run test:e2e

  # NOTE: the gasless success-path E2E (claimant submits → name registered) needs a real ERC-4337
  # bundler + Paymaster and is not yet implemented (T019). The job above uses the mock registrar and
  # does not exercise the sponsored submission.
